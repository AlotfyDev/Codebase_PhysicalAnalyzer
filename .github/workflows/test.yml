name: Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: |
          ruff check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Run mypy
        run: |
          mypy domain/ application/ ports/ adapters/config/ adapters/graphify/

  unit_tests:
    name: unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install unit test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock

      - name: Prepare output folders
        run: |
          mkdir -p tests/output/unit

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --junitxml=tests/output/unit/junit.xml

      - name: Upload unit test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: tests/output/unit/

  contract_tests:
    name: contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install contract test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock

      - name: Prepare output folders
        run: |
          mkdir -p tests/output/contracts

      - name: Run contract tests
        run: |
          pytest tests/contracts/ -v --tb=short --junitxml=tests/output/contracts/junit.xml

      - name: Upload contract test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: tests/output/contracts/

  integration_tests:
    name: integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock

      - name: Prepare output folders
        run: |
          mkdir -p tests/output/integration

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short --junitxml=tests/output/integration/junit.xml

      - name: Upload integration test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: tests/output/integration/

  e2e_tests:
    name: e2e tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install e2e test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock

      - name: Prepare output folders
        run: |
          mkdir -p tests/output/e2e

      - name: Run e2e tests
        run: |
          pytest tests/e2e/ -v --tb=short --junitxml=tests/output/e2e/junit.xml

      - name: Upload e2e test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: tests/output/e2e/

  non_functional_tests:
    name: non-functional tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install non-functional test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock

      - name: Prepare output folders
        run: |
          mkdir -p tests/output/non_functional

      - name: Run non-functional tests
        run: |
          pytest tests/non_functional/ -v --tb=short --junitxml=tests/output/non_functional/junit.xml

      - name: Upload non-functional test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: non-functional-test-results
          path: tests/output/non_functional/

  regression_tests:
    name: regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install regression test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock

      - name: Prepare output folders
        run: |
          mkdir -p tests/output/regression

      - name: Run regression tests
        run: |
          pytest tests/regression/ -v --tb=short --junitxml=tests/output/regression/junit.xml

      - name: Upload regression test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: tests/output/regression/

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs:
      - unit_tests
      - contract_tests
      - integration_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install coverage dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock

      - name: Prepare output folders
        run: |
          mkdir -p tests/output/coverage

      - name: Generate coverage report
        run: |
          pytest tests/unit tests/contracts tests/integration \
            --cov=. \
            --cov-report=xml:tests/output/coverage/coverage.xml \
            --cov-report=html:tests/output/coverage/htmlcov \
            --junitxml=tests/output/coverage/junit.xml

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tests/output/coverage/