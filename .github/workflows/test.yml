name: Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock
    
    - name: Run linting (ruff)
      run: |
        pip install ruff
        ruff check . --ignore=E501,F401,N999,W291,W292,W293,I001,UP006,UP015,UP035,UP045,E701
      continue-on-error: true
    
    - name: Run type checking (mypy)
      run: |
        pip install mypy
        mypy domain/ application/ ports/ adapters/config/ adapters/graphify/ --ignore-missing-imports
      continue-on-error: true
    
    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --tb=short
    
    - name: Run contract tests
      run: |
        pytest tests/contracts/ -v --tb=short
    
    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --tb=short
    
    - name: Run E2E tests
      run: |
        pytest tests/e2e/ -v --tb=short
    
    - name: Run non-functional tests
      run: |
        pytest tests/non_functional/ -v --tb=short
    
    - name: Run regression tests
      run: |
        pytest tests/regression/ -v --tb=short
    
    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: tests/output/

  coverage:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
    
    - name: Generate coverage report
      run: |
        pytest tests/ --cov=. --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Upload HTML coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/